  '@tabler/icons-react': 3.36.1
  '@tailwindcss/postcss': ^4.1.18
  '@tailwindcss/vite': ^4.1.18
  '@tanstack/devtools-vite': ^0.5.1
  '@tanstack/react-devtools': 0.9.5
  '@tanstack/react-form': ^1.28.3
  '@tanstack/react-form-devtools': 0.2.16
  '@tanstack/react-query': ^5.90.21
  '@tanstack/react-query-devtools': 5.91.3
  '@tanstack/react-router': ^1.159.5
  '@tanstack/react-router-devtools': ^1.159.5
  '@tanstack/react-store': 0.8.1
  '@tanstack/router-plugin': ^1.159.5
  '@trpc/client': 11.10.0
  '@trpc/server': 11.10.0
  '@trpc/tanstack-react-query': 11.10.0
  '@types/node': ^22.19.9
  '@vitejs/plugin-legacy': ^7.2.1
  '@vitejs/plugin-react-swc': ^4.2.3
  better-auth: 1.5.0-beta.7
  browser-sync: ^3.0.4
  cross-env: ^10.1.0
  eslint: ^9.39.2
  fastify: ^5.7.4
  lucide-react: 0.563.0
  pino-pretty: ^13.1.3
  prettier: ^3.8.1
  superjson: 2.2.6
  tailwind-merge: ^3.4.0
  tailwindcss: ^4.1.18
  tsup: ^8.5.1
  tsx: ^4.21.0
  tw-animate-css: ^1.4.0
  typescript: ^5.9.3
  typescript-eslint: ^8.54.0
  url-join: 5.0.0
  vite: ^7.3.1
  vite-plugin-browser-sync: ^6.0.0
  vite-tsconfig-paths: ^6.1.1
  zod: ^4.3.6

catalogs:
  react19:
    '@types/react': ^19.2.14
    '@types/react-dom': ^19.2.3
    react: ^19.2.4
    react-dom: ^19.2.4

linkWorkspacePackages: true

onlyBuiltDependencies:
  - '@tailwindcss/oxide'
  - esbuild

overrides:
  '@types/minimatch': 5.1.2
  lightningcss: 1.30.1
  vite: 7.3.1

# These packages import 'fastify' types in their .d.ts files but don't declare it as a
# peer dependency. Without this, pnpm's strict isolation prevents TypeScript from resolving
# fastify types from the plugin locations in .pnpm/, causing type-aware ESLint rules to fail
# with "type that cannot be resolved" errors (especially after package updates).
packageExtensions:
  '@fastify/cookie':
    peerDependencies:
      fastify: '*'
  '@fastify/cors':
    peerDependencies:
      fastify: '*'
  '@fastify/helmet':
    peerDependencies:
      fastify: '*'
  '@fastify/rate-limit':
    peerDependencies:
      fastify: '*'
  '@trpc/server':
    peerDependencies:
      fastify: '*'
    peerDependenciesMeta:
      fastify:
        optional: true

publicHoistPattern:
  - '@ianvs/prettier-plugin-sort-imports'
  - prettier-plugin-tailwindcss
